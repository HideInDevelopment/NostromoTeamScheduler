<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostromo Team Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header>
    <div>
        <div class="logo">NOSTROMO TEAM <span>SCHEDULE</span></div>
    </div>
    <div class="week-nav">
        <button class="btn-nav" id="prevWeek">←</button>
        <div class="week-label" id="weekLabel">—</div>
        <button class="btn-nav" id="nextWeek">→</button>
        <button class="btn-save hidden" id="btnGuardar">💾 Guardar</button>
    </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="grid-wrapper">
    <table id="scheduleTable">
        <thead>
        <tr id="headerRow">
            <th>Persona</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="legend">
    <div class="legend-title">Leyenda</div>
    <div class="legend-item">🏠 Home office</div>
    <div class="legend-item">🏢 Oficina</div>
    <div class="legend-item">💀 Oficina obligatoria</div>
    <div class="legend-item">✈️ Viaje</div>
    <div class="legend-item">✳️ Festivo</div>
    <div class="legend-item">😎 Vacaciones</div>
    <div class="legend-item">🤒 Baja</div>
    <div class="legend-item">🧑‍💻 Formación</div>
</div>

<div class="picker" id="picker">
    <div class="picker-title" id="pickerTitle">Estado</div>
</div>
<div class="overlay" id="overlay"></div>
<div class="toast" id="toast"></div>
<div class="spinner" id="spinner">
    <div class="spinner-content">
        <div class="spinner-icon"></div>
        <span>Cargando...</span>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
